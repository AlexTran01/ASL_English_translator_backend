<!-- Simple HTML + JS to record 3 seconds and POST -->
<div style="display:flex;gap:12px;align-items:center">
  <button id="start_translate">Record 3s & Send to /translate_asl</button>
  <button id="start_gemini">Record 3s & Send to /label_with_gemini</button>
  <div id="result" style="margin-left:8px"></div>
</div>
<script>
async function recordAndSend(url) {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
  const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
  const chunks = [];
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.start();

  // stop after 3 seconds
  await new Promise(res => setTimeout(res, 3000));
  recorder.stop();

  await new Promise(res => recorder.onstop = res);
  const blob = new Blob(chunks, { type: 'video/webm' });

  const form = new FormData();
  form.append('video', blob, 'capture.webm');

  const resp = await fetch(url, { method: 'POST', body: form });
  let text;
  try {
    const json = await resp.json();
    text = JSON.stringify(json);
  } catch (e) {
    text = await resp.text();
  }
  document.getElementById('result').innerText = text;
  stream.getTracks().forEach(t => t.stop());
}

document.getElementById('start_translate').onclick = () => recordAndSend('/translate_asl');
document.getElementById('start_gemini').onclick = () => recordAndSend('/label_with_gemini');
</script>
