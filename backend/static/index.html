<!-- Simple HTML + JS to record 3 seconds and POST -->
<button id="start">Record 3s & Send</button>
<script>
const startBtn = document.getElementById('start');
startBtn.onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
  const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
  const chunks = [];
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.start();

  // stop after 3 seconds
  await new Promise(res => setTimeout(res, 3000));
  recorder.stop();

  await new Promise(res => recorder.onstop = res);
  const blob = new Blob(chunks, { type: 'video/webm' });

  const form = new FormData();
  form.append('video', blob, 'capture.webm');

  const resp = await fetch('http://127.0.0.1:8000/translate_asl', { method: 'POST', body: form });
  const text = await resp.text();
  alert('Prediction: ' + text);
  stream.getTracks().forEach(t => t.stop());
};
</script>
